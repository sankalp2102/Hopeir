name: Deploy to GCP
 
on:
  push:
    branches:
      - main
 
jobs:
  deploy:
    runs-on: ubuntu-latest
 
    steps:
      # Step 1 — checkout code (needed so Actions knows the repo)
      - name: Checkout code
        uses: actions/checkout@v3
 
      # Step 2 — SSH into GCP and deploy
      - name: Deploy to GCP via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            # Go to project folder
            cd ~/hopeir
 
            # Pull latest code from main
            git pull origin main
 
            # Rebuild only the django container
            docker-compose build django
 
            # Restart django container with new image
            # db and supertokens are untouched
            docker-compose up -d django
 
            # Run migrations on the new container
            docker-compose exec -T django python manage.py migrate
 
            # Print confirmation
            echo "Deployment complete"
